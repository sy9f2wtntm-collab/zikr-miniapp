<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>Мои зикры</title>
  <meta name="theme-color" content="#edf1f6" />
  <script src="https://telegram.org/js/telegram-web-app.js?60"></script>

  <style>
    html,
    body {
      overflow-anchor: none;
      touch-action: manipulation;
      overscroll-behavior: none;
      margin: 0;
      min-height: 100%;
      background: #edf1f6;
      color: #17171f;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    :root {
      --bg: #edf1f6;
      --card: #ffffff;
      --text: #17171f;
      --muted: #6f7481;
      --primary: #4a93d2;
      --primary-soft: #dfeefd;
      --line: #dde3ea;
      --success: #1ea76b;
      --success-soft: rgba(30, 167, 107, 0.12);
      --danger: #c24848;
      --shadow: 0 10px 24px rgba(13, 24, 42, 0.06);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
      border: none;
      background: transparent;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .app-shell {
      width: min(100%, 480px);
      min-height: 100vh;
      padding: 18px 16px 92px;
    }

    .topbar {
      display: grid;
      grid-template-columns: 56px 1fr 56px;
      gap: 10px;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 10px 0 14px;
      background: linear-gradient(to bottom, var(--bg) 78%, rgba(237, 241, 246, 0));
    }

    .search-pill {
      min-height: 56px;
      border-radius: 999px;
      padding: 0 22px;
      display: flex;
      align-items: center;
      font-size: 21px;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.66);
      backdrop-filter: blur(8px);
    }

    .icon-button {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.66);
      box-shadow: var(--shadow);
      font-size: 26px;
      flex-shrink: 0;
    }

    .hidden {
      visibility: hidden;
    }

    #app.with-detail-dock {
      padding-bottom: 290px;
    }

    .screen {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 22px;
    }

    .category-card,
    .list-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 20px;
      border-radius: var(--radius-xl);
      background: var(--card);
      box-shadow: var(--shadow);
      text-align: left;
      width: 100%;
    }

    .category-card-main,
    .list-row-main {
      min-width: 0;
      flex: 1;
    }

    .category-card-title,
    .list-row-title {
      font-size: 19px;
      font-weight: 800;
      margin-bottom: 8px;
      color: var(--primary);
    }

    .category-card-sub,
    .muted {
      color: var(--muted);
    }

    .category-card-sub {
      font-size: 15px;
      line-height: 1.45;
    }

    .substat {
      margin-top: 6px;
      color: var(--primary);
      font-size: 14px;
      font-weight: 700;
    }

    .count-badge,
    .status-badge,
    .category-badge {
      min-width: 64px;
      height: 54px;
      padding: 0 14px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      flex-shrink: 0;
    }

    .count-badge,
    .category-badge {
      background: var(--primary-soft);
      color: var(--primary);
    }

    .status-badge.done {
      min-width: 54px;
      height: 54px;
      background: rgba(30, 167, 107, 0.14);
      color: var(--success);
    }

    .detail-header {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-bottom: 26px;
    }

    .arabic {
      direction: rtl;
      text-align: center;
      font-size: 30px;
      line-height: 1.9;
      margin: 0;
      word-break: break-word;
      font-weight: 700;
    }

    .transliteration {
      color: var(--muted);
      line-height: 1.8;
      font-size: 17px;
      font-weight: 700;
      word-break: break-word;
    }

    .translation {
      color: var(--muted);
      line-height: 1.8;
      font-size: 17px;
      word-break: break-word;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    .stat-box {
      background: var(--card);
      box-shadow: var(--shadow);
      border-radius: 22px;
      padding: 18px;
      position: relative;
      overflow: hidden;
      min-height: 120px;
    }

    .stat-box strong {
      display: block;
      font-size: 34px;
      line-height: 1;
      margin-bottom: 10px;
      position: relative;
      z-index: 2;
    }

    .stat-box span {
      position: relative;
      z-index: 2;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.35;
    }

    .progress-stat {
      border: 1px solid rgba(30, 167, 107, 0.12);
    }

    .progress-stat strong {
      color: var(--success);
    }

    .progress-track {
      width: 100%;
      height: 10px;
      background: rgba(30, 167, 107, 0.09);
      border-radius: 999px;
      margin-top: 12px;
      overflow: hidden;
      position: relative;
      z-index: 2;
    }

    .progress-fill-green {
      height: 100%;
      background: linear-gradient(90deg, #1ea76b 0%, #35c885 100%);
      border-radius: 999px;
      width: 0%;
      transition: width 0.2s ease;
    }

    .diary-open-btn {
      width: 100%;
      text-align: left;
      background: var(--card);
      box-shadow: var(--shadow);
      border-radius: 24px;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .diary-open-title {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .diary-open-subtitle {
      color: var(--muted);
      line-height: 1.45;
      font-size: 16px;
      max-width: 280px;
    }

    .diary-open-icon {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      background: var(--primary-soft);
      color: var(--primary);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      font-weight: 800;
      flex-shrink: 0;
    }

    .calendar-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .calendar-nav {
      display: flex;
      gap: 8px;
    }

    .month-switch {
      min-height: 42px;
      padding: 0 14px;
    }

    .mini-stats-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .mini-stat {
      background: #f7f9fc;
      border-radius: 999px;
      padding: 10px 14px;
      color: var(--muted);
    }

    .calendar-weekdays,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .calendar-weekdays {
      margin-bottom: 8px;
    }

    .weekday-cell {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .calendar-cell {
      min-height: 68px;
      border-radius: 18px;
      padding: 10px 6px;
      background: #f8fafc;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .calendar-cell.empty {
      background: transparent;
      box-shadow: none;
    }

    .calendar-cell.today {
      outline: 2px solid rgba(74, 147, 210, 0.22);
    }

    .calendar-cell.active {
      background: #eef6ff;
    }

    .calendar-cell.done {
      background: rgba(30, 167, 107, 0.12);
    }

    .calendar-day {
      font-weight: 800;
    }

    .calendar-mark {
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    .bottom-nav {
      position: fixed;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      width: min(calc(100% - 24px), 452px);
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 10px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.82);
      backdrop-filter: blur(10px);
      box-shadow: var(--shadow);
      z-index: 30;
      transition: opacity 0.18s ease, visibility 0.18s ease, transform 0.18s ease;
    }

    .bottom-nav.hidden-in-subscreen {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateX(-50%) translateY(20px);
    }

    .nav-btn {
      min-height: 50px;
      border-radius: 16px;
      color: var(--muted);
      font-weight: 700;
    }

    .nav-btn.active {
      background: var(--primary-soft);
      color: var(--primary);
    }

    .detail-dock {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 16px;
      width: min(calc(100% - 24px), 452px);
      z-index: 25;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
    }

    .detail-dock.active {
      opacity: 1;
      pointer-events: auto;
    }

    .detail-dock-card {
      background: rgba(255, 255, 255, 0.92);
      backdrop-filter: blur(10px);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .tap-panel {
      width: 100%;
      min-height: 160px;
      border-radius: 24px;
      background: linear-gradient(180deg, #ffffff 0%, #f9fbfe 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.65);
      padding: 12px 14px 14px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      text-align: center;
    }

    .tap-progress {
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: rgba(74, 147, 210, 0.14);
      overflow: hidden;
    }

    .tap-progress-fill {
      height: 100%;
      border-radius: 999px;
      background: var(--primary);
      width: 0%;
      transition: width 0.18s ease;
    }

    .tap-count {
      font-size: 62px;
      line-height: 1;
      font-weight: 500;
      color: var(--text);
      margin-top: 2px;
    }

    .tap-progress-text {
      font-size: 18px;
      font-weight: 700;
      color: var(--muted);
      line-height: 1.15;
      margin-top: -4px;
    }

    .tap-done {
      min-height: 46px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      background: var(--primary);
      color: white;
      font-size: 17px;
      font-weight: 800;
      padding: 0 14px;
      width: 100%;
    }

    .tap-hint {
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .dock-footer {
      display: grid;
      grid-template-columns: 46px 1fr 46px;
      gap: 10px;
      align-items: center;
    }

    .arrow-btn {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: var(--primary-soft);
      color: var(--primary);
      font-size: 22px;
      font-weight: 800;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .arrow-btn:disabled {
      opacity: 0.45;
    }

    .primary-button,
    .secondary-button,
    .ghost-button,
    .danger-button {
      min-height: 52px;
      padding: 0 20px;
      border-radius: 16px;
      font-weight: 700;
    }

    .primary-button {
      background: var(--primary);
      color: white;
    }

    .secondary-button {
      background: var(--primary-soft);
      color: var(--primary);
    }

    .ghost-button {
      background: rgba(23, 23, 31, 0.06);
      color: var(--text);
    }

    .danger-button {
      background: rgba(194, 72, 72, 0.1);
      color: var(--danger);
    }

    .dock-btn {
      min-height: 46px;
      padding: 0 12px;
      font-size: 17px;
    }

    .modal {
      width: min(100% - 24px, 520px);
      border: none;
      padding: 0;
      border-radius: 28px;
      background: transparent;
    }

    .modal::backdrop {
      background: rgba(12, 19, 28, 0.4);
    }

    .modal-card {
      padding: 22px;
      background: white;
      border-radius: 28px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .modal-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .modal-head h3 {
      margin: 0;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 8px;
      font-weight: 600;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 16px;
      background: #f8fafc;
    }

    .empty-state {
      text-align: center;
      padding: 32px 22px;
    }

    .empty-state h3 {
      margin: 0 0 8px;
    }

    .manage-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .manage-total {
      background: #f8fafc;
      border-radius: 18px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .manage-total strong {
      font-size: 24px;
    }

    @media (max-width: 390px) {
      .search-pill {
        font-size: 18px;
      }

      .stat-grid {
        grid-template-columns: 1fr;
      }

      .arabic {
        font-size: 26px;
      }

      .calendar-cell {
        min-height: 58px;
        padding: 8px 4px;
      }

      .calendar-mark {
        font-size: 12px;
      }

      .tap-count {
        font-size: 54px;
      }

      .tap-panel {
        min-height: 150px;
      }

      #app.with-detail-dock {
        padding-bottom: 280px;
      }

      .diary-open-title {
        font-size: 24px;
      }

      .count-badge,
      .category-badge,
      .status-badge.done {
        min-width: 56px;
        height: 50px;
      }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <button id="backButton" class="icon-button hidden" aria-label="Назад">←</button>
      <div class="search-pill" id="screenTitle">Мои зикры</div>
      <button id="addQuickButton" class="icon-button" aria-label="Добавить">＋</button>
    </header>

    <main id="app"></main>
    <div id="detailDock" class="detail-dock"></div>

    <nav id="bottomNav" class="bottom-nav">
      <button class="nav-btn active" data-tab="mine">Мои зикры</button>
      <button class="nav-btn" data-tab="stats">Статистика</button>
    </nav>
  </div>

  <dialog id="zikrDialog" class="modal">
    <form id="zikrForm" class="modal-card">
      <div class="modal-head">
        <h3 id="dialogTitle">Добавить зикр</h3>
        <button type="button" id="closeDialog" class="ghost-button">✕</button>
      </div>

      <input name="id" type="hidden" />

      <label>
        Раздел
        <select name="category">
          <option value="morning">Утренние зикры</option>
          <option value="evening">Вечерние зикры</option>
          <option value="daily">Повседневные зикры</option>
        </select>
      </label>

      <label>
        Подпись / заметка
        <input name="title" type="text" placeholder="Например: Утренний зикр или короткая заметка" />
      </label>

      <label>
        Арабский текст
        <textarea name="arabic" rows="4" placeholder="Текст на арабском"></textarea>
      </label>

      <label>
        Транскрипция
        <textarea name="transliteration" rows="3" placeholder="Как читается"></textarea>
      </label>

      <label>
        Перевод
        <textarea name="translation" rows="4" placeholder="Перевод"></textarea>
      </label>

      <label>
        Количество повторений в день
        <input name="target" type="number" min="1" step="1" value="33" required />
      </label>

      <button type="submit" class="primary-button" id="submitDialogButton">Сохранить</button>
    </form>
  </dialog>

  <dialog id="manageDialog" class="modal">
    <div class="modal-card">
      <div class="modal-head">
        <h3 id="manageTitle">Управление зикром</h3>
        <button type="button" id="closeManageDialog" class="ghost-button">✕</button>
      </div>

      <div class="manage-total">
        <span class="muted">Всего прочитано</span>
        <strong id="manageTotalValue">0</strong>
      </div>

      <div class="manage-actions">
        <button type="button" class="secondary-button" id="manageEditBtn">Редактировать</button>
        <button type="button" class="ghost-button" id="manageResetBtn">Сбросить счётчик</button>
        <button type="button" class="danger-button" id="manageDeleteBtn">Удалить зикр</button>
      </div>
    </div>
  </dialog>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    document.addEventListener("dblclick", (e) => {
      e.preventDefault();
    }, { passive: false });

    let lastTouchEnd = 0;
    document.addEventListener("touchend", (e) => {
      const now = Date.now();
      if (now - lastTouchEnd <= 300) {
        e.preventDefault();
      }
      lastTouchEnd = now;
    }, { passive: false });

    const STORAGE_KEY = "zikr-miniapp-state-v18";

    const CATEGORY_META = {
      morning: { title: "Утренние зикры" },
      evening: { title: "Вечерние зикры" },
      daily: { title: "Повседневные зикры" }
    };

    const MORNING_ZIKRS = [
      {
        title: "Саййидуль-истигфар",
        arabic: "اللَّهُمَّ أَنْتَ رَبِّي لَا إِلَهَ إِلَّا أَنْتَ خَلَقْتَنِي وَأَنَا عَبْدُكَ وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ أَعُوذُ بِكَ مِنْ شَرِّ مَا صَنَعْتُ أَبُوءُ لَكَ بِنِعْمَتِكَ عَلَيَّ وَأَبُوءُ بِذَنْبِي فَاغْفِرْ لِي فَإِنَّهُ لَا يَغْفِرُ الذُّنُوبَ إِلَّا أَنْتَ",
        transliteration: "Аллахумма, Анта Рабби, ля иляха илля Анта, халякта-ни ва ана ‘абду-кя, ва ана ‘аля ‘ахди-кя ва ва‘ди-кя ма-стата‘ту. А‘узу би-кя мин шарри ма сана‘ту, абу’у ля-кя би-ни‘мати-кя ‘аляййа, ва абу’у би-занби, фа-гфир ли, фа-инна-ху ля йагфиру-з-зунуба илля Анта.",
        translation: "О Аллах, Ты — Господь мой, нет бога, достойного поклонения, кроме Тебя. Ты сотворил меня, и я — Твой раб. Я буду хранить верность Тебе, пока у меня хватит сил. Прибегаю к Тебе от зла того, что я сделал. Признаю милость, оказанную Тобой мне, и признаю свой грех. Прости же меня, ибо, поистине, никто не прощает грехов, кроме Тебя.",
        target: 1
      },
      {

    const screenTitleEl = document.getElementById("screenTitle");
    const backButtonEl = document.getElementById("backButton");
    const addQuickButtonEl = document.getElementById("addQuickButton");
    const dialogEl = document.getElementById("zikrDialog");
    const closeDialogEl = document.getElementById("closeDialog");
    const zikrFormEl = document.getElementById("zikrForm");
    const dialogTitleEl = document.getElementById("dialogTitle");
    const submitDialogButtonEl = document.getElementById("submitDialogButton");
    const detailDockEl = document.getElementById("detailDock");
    const bottomNavEl = document.getElementById("bottomNav");
    const manageDialogEl = document.getElementById("manageDialog");
    const closeManageDialogEl = document.getElementById("closeManageDialog");
    const manageEditBtnEl = document.getElementById("manageEditBtn");
    const manageResetBtnEl = document.getElementById("manageResetBtn");
    const manageDeleteBtnEl = document.getElementById("manageDeleteBtn");
    const manageTitleEl = document.getElementById("manageTitle");
    const manageTotalValueEl = document.getElementById("manageTotalValue");

    attachEvents();
    render();

    function scrollToTopNow() {
      window.scrollTo({ top: 0, left: 0, behavior: "auto" });
      document.documentElement.scrollTop = 0;
      document.body.scrollTop = 0;
      appEl.scrollTop = 0;
    }

    function forceTop() {
      scrollToTopNow();
      requestAnimationFrame(scrollToTopNow);
      setTimeout(scrollToTopNow, 0);
      setTimeout(scrollToTopNow, 80);
      setTimeout(scrollToTopNow, 180);
      setTimeout(scrollToTopNow, 320);
    }

    function afterRenderTop() {
      setTimeout(forceTop, 0);
    }

    function loadData() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return structuredClone(seedData);

      try {
        const parsed = JSON.parse(raw);
        return {
          customZikrs: Array.isArray(parsed.customZikrs)
            ? parsed.customZikrs.map((item) => ({
                ...item,
                category: item.category || "daily"
              }))
            : structuredClone(seedData.customZikrs),
          progressByDate: parsed.progressByDate || {}
        };
      } catch (_error) {
        return structuredClone(seedData);
      }
    }

    function saveData() {
      localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify({
          customZikrs: state.data.customZikrs,
          progressByDate: state.data.progressByDate
        })
      );
    }

    function attachEvents() {
      backButtonEl.addEventListener("click", handleBack);

      addQuickButtonEl.addEventListener("click", () => {
        openCreateDialog(state.screen === "category" ? state.currentCategory : "daily");
      });

      closeDialogEl.addEventListener("click", () => {
        dialogEl.close();
      });

      closeManageDialogEl.addEventListener("click", () => {
        manageDialogEl.close();
      });

      dialogEl.addEventListener("click", (event) => {
        const rect = dialogEl.getBoundingClientRect();
        const inDialog =
          rect.top <= event.clientY &&
          event.clientY <= rect.top + rect.height &&
          rect.left <= event.clientX &&
          event.clientX <= rect.left + rect.width;
        if (!inDialog) dialogEl.close();
      });

      manageDialogEl.addEventListener("click", (event) => {
        const rect = manageDialogEl.getBoundingClientRect();
        const inDialog =
          rect.top <= event.clientY &&
          event.clientY <= rect.top + rect.height &&
          rect.left <= event.clientX &&
          rect.left + rect.width >= event.clientX;
        if (!inDialog) manageDialogEl.close();
      });

      zikrFormEl.addEventListener("submit", (event) => {
        event.preventDefault();
        const formData = new FormData(zikrFormEl);
        const existingId = String(formData.get("id") || "").trim();
        const target = Math.max(1, Number(formData.get("target")) || 1);
        const category = String(formData.get("category") || "daily");

        const payload = {
          category,
          title: String(formData.get("title") || "").trim(),
          arabic: String(formData.get("arabic") || "").trim(),
          transliteration: String(formData.get("transliteration") || "").trim(),
          translation: String(formData.get("translation") || "").trim(),
          target
        };

        if (existingId) {
          const zikr = getZikrById(existingId);
          if (zikr) {
            Object.assign(zikr, payload);
            Object.values(state.data.progressByDate).forEach((dayProgress) => {
              if (typeof dayProgress[existingId] !== "undefined") {
                dayProgress[existingId] = Math.min(Number(dayProgress[existingId] || 0), target);
              }
            });
          }
          state.zikrId = existingId;
          state.currentCategory = category;
        } else {
          const id = `custom-${Date.now()}`;
          state.data.customZikrs.unshift({ id, ...payload, isCustom: true });
          state.zikrId = id;
          state.currentCategory = category;
        }

        saveData();
        zikrFormEl.reset();
        dialogEl.close();
        state.screen = "detail";
        render();
        afterRenderTop();
      });

      document.querySelectorAll(".nav-btn").forEach((button) => {
        button.addEventListener("click", () => {
          state.screen = button.dataset.tab;
          state.zikrId = null;
          render();
          afterRenderTop();
        });
      });

      manageEditBtnEl.addEventListener("click", () => {
        manageDialogEl.close();
        openEditDialog(state.zikrId);
      });

      manageResetBtnEl.addEventListener("click", () => {
        manageDialogEl.close();
        resetZikr(state.zikrId);
      });

      manageDeleteBtnEl.addEventListener("click", () => {
        manageDialogEl.close();
        deleteCurrentZikr();
      });
    }

    function getAllZikrs(category = null) {
      if (!category) return state.data.customZikrs;
      return state.data.customZikrs.filter((item) => (item.category || "daily") === category);
    }

    function getZikrById(zikrId) {
      return state.data.customZikrs.find((item) => item.id === zikrId);
    }

    function getZikrIndex(zikrId) {
      const zikr = getZikrById(zikrId);
      if (!zikr) return -1;
      return getAllZikrs(zikr.category).findIndex((item) => item.id === zikrId);
    }

    function getDisplayLabel(zikrId) {
      const index = getZikrIndex(zikrId);
      return index >= 0 ? `Зикр ${index + 1}` : "Зикр";
    }

    function getTodayKey() {
      return getDateKey(new Date());
    }

    function getDateKey(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }

    function ensureDateProgress(dateKey = getTodayKey()) {
      if (!state.data.progressByDate[dateKey]) {
        state.data.progressByDate[dateKey] = {};
      }
      return state.data.progressByDate[dateKey];
    }

    function getCount(zikrId, dateKey = getTodayKey()) {
      const dayProgress = state.data.progressByDate[dateKey] || {};
      return Number(dayProgress[zikrId] || 0);
    }

    function setCount(zikrId, count, dateKey = getTodayKey()) {
      const zikr = getZikrById(zikrId);
      if (!zikr) return;
      const safeCount = Math.max(0, Math.min(zikr.target, count));
      const dayProgress = ensureDateProgress(dateKey);
      dayProgress[zikrId] = safeCount;
      saveData();
    }

    function getAllTimeCount(zikrId) {
      return Object.values(state.data.progressByDate).reduce((sum, dayProgress) => {
        return sum + Number(dayProgress[zikrId] || 0);
      }, 0);
    }

    function getDayTotal(dateKey = getTodayKey()) {
      return getAllZikrs().reduce((sum, zikr) => sum + getCount(zikr.id, dateKey), 0);
    }

    function isDone(zikrId, dateKey = getTodayKey()) {
      const zikr = getZikrById(zikrId);
      if (!zikr) return false;
      return getCount(zikrId, dateKey) >= zikr.target;
    }

    function incrementZikr(zikrId) {
      const zikr = getZikrById(zikrId);
      if (!zikr) return;
      const nextCount = Math.min(zikr.target, getCount(zikrId) + 1);
      setCount(zikrId, nextCount);

      if (tg?.HapticFeedback) {
        tg.HapticFeedback.impactOccurred("light");
      }

      render();
    }

    function resetZikr(zikrId) {
      setCount(zikrId, 0);
      render();
    }

    function deleteCurrentZikr() {
      const confirmed = window.confirm("Удалить этот зикр?");
      if (!confirmed) return;

      const deleted = getZikrById(state.zikrId);
      state.data.customZikrs = state.data.customZikrs.filter((item) => item.id !== state.zikrId);
      Object.values(state.data.progressByDate).forEach((dayProgress) => {
        delete dayProgress[state.zikrId];
      });

      saveData();

      const remainingInCategory = getAllZikrs(deleted?.category || state.currentCategory);
      if (state.screen === "detail") {
        state.screen = remainingInCategory.length ? "category" : "mine";
      }
      state.zikrId = null;
      render();
      afterRenderTop();
    }

    function getTodayStats() {
      const zikrs = getAllZikrs();
      const completed = zikrs.filter((item) => isDone(item.id)).length;
      const totalRepeats = getDayTotal();
      return {
        total: zikrs.length,
        completed,
        totalRepeats,
        percent: zikrs.length ? Math.round((completed / zikrs.length) * 100) : 0
      };
    }

    function getCategoryStats(category) {
      const items = getAllZikrs(category);
      const completed = items.filter((item) => isDone(item.id)).length;
      const totalToday = items.reduce((sum, item) => sum + getCount(item.id), 0);
      const allTimeTotal = items.reduce((sum, item) => sum + getAllTimeCount(item.id), 0);
      return {
        total: items.length,
        completed,
        totalToday,
        allTimeTotal,
        percent: items.length ? Math.round((completed / items.length) * 100) : 0
      };
    }

    function getDayStats(dateKey) {
      const zikrs = getAllZikrs();
      const completed = zikrs.filter((item) => isDone(item.id, dateKey)).length;
      const totalRepeats = getDayTotal(dateKey);
      return {
        total: zikrs.length,
        completed,
        totalRepeats,
        active: totalRepeats > 0,
        allDone: zikrs.length > 0 && completed === zikrs.length
      };
    }

    function getActiveStreak() {
      let streak = 0;
      const date = new Date();

      while (true) {
        const dateKey = getDateKey(date);
        if (!getDayStats(dateKey).active) break;
        streak += 1;
        date.setDate(date.getDate() - 1);
      }

      return streak;
    }

    function getMonthModel(offset = 0) {
      const today = new Date();
      const monthDate = new Date(today.getFullYear(), today.getMonth() + offset, 1);
      const year = monthDate.getFullYear();
      const month = monthDate.getMonth();
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const daysInMonth = lastDay.getDate();
      const startOffset = (firstDay.getDay() + 6) % 7;
      const totalCells = Math.ceil((startOffset + daysInMonth) / 7) * 7;
      const cells = [];

      for (let i = 0; i < totalCells; i += 1) {
        if (i < startOffset || i >= startOffset + daysInMonth) {
          cells.push({ empty: true });
          continue;
        }

        const dayNumber = i - startOffset + 1;
        const date = new Date(year, month, dayNumber);
        const dateKey = getDateKey(date);
        const stats = getDayStats(dateKey);

        cells.push({
          empty: false,
          dateKey,
          dayNumber,
          isToday: dateKey === getTodayKey(),
          ...stats
        });
      }

      return {
        monthLabel: monthDate.toLocaleDateString("ru-RU", { month: "long", year: "numeric" }),
        cells
      };
    }

    function getMonthActivity(offset = 0) {
      const today = new Date();
      const date = new Date(today.getFullYear(), today.getMonth() + offset, 1);
      const year = date.getFullYear();
      const month = date.getMonth();
      let activeDays = 0;
      let doneDays = 0;

      Object.keys(state.data.progressByDate).forEach((dateKey) => {
        const [y, m] = dateKey.split("-").map(Number);
        if (y === year && m === month + 1) {
          const stats = getDayStats(dateKey);
          if (stats.active) activeDays += 1;
          if (stats.allDone) doneDays += 1;
        }
      });

      return { activeDays, doneDays };
    }

    function openCreateDialog(category = "daily") {
      zikrFormEl.reset();
      dialogTitleEl.textContent = "Добавить зикр";
      submitDialogButtonEl.textContent = "Сохранить";
      zikrFormEl.elements.id.value = "";
      zikrFormEl.elements.category.value = category;
      zikrFormEl.elements.target.value = 100;
      dialogEl.showModal();
    }

    function openEditDialog(zikrId) {
      const zikr = getZikrById(zikrId);
      if (!zikr) return;

      dialogTitleEl.textContent = "Редактировать зикр";
      submitDialogButtonEl.textContent = "Сохранить изменения";
      zikrFormEl.elements.id.value = zikr.id;
      zikrFormEl.elements.category.value = zikr.category || "daily";
      zikrFormEl.elements.title.value = zikr.title || "";
      zikrFormEl.elements.arabic.value = zikr.arabic || "";
      zikrFormEl.elements.transliteration.value = zikr.transliteration || "";
      zikrFormEl.elements.translation.value = zikr.translation || "";
      zikrFormEl.elements.target.value = zikr.target || 100;
      dialogEl.showModal();
    }

    function openManageDialog() {
      const zikr = getZikrById(state.zikrId);
      if (!zikr) return;

      manageTitleEl.textContent = `Управление — ${getDisplayLabel(zikr.id)}`;
      manageTotalValueEl.textContent = getAllTimeCount(zikr.id);
      manageDialogEl.showModal();
    }

    function goToPrevZikr() {
      const items = getAllZikrs(state.currentCategory);
      if (!items.length || !state.zikrId) return;
      const currentIndex = items.findIndex((item) => item.id === state.zikrId);
      const prevIndex = currentIndex > 0 ? currentIndex - 1 : items.length - 1;
      state.zikrId = items[prevIndex].id;
      render();
      afterRenderTop();
    }

    function goToNextZikr() {
      const items = getAllZikrs(state.currentCategory);
      if (!items.length || !state.zikrId) return;
      const currentIndex = items.findIndex((item) => item.id === state.zikrId);
      const nextIndex = currentIndex >= 0 ? (currentIndex + 1) % items.length : 0;
      state.zikrId = items[nextIndex].id;
      render();
      afterRenderTop();
    }

    function handleBack() {
      if (state.screen === "detail") {
        state.screen = "category";
        state.zikrId = null;
        render();
        afterRenderTop();
        return;
      }

      if (state.screen === "category") {
        state.screen = "mine";
        render();
        afterRenderTop();
        return;
      }

      if (state.screen === "habit") {
        state.screen = "stats";
        render();
        afterRenderTop();
      }
    }

    function syncNav() {
      const active = state.screen === "stats" || state.screen === "habit" ? "stats" : "mine";
      document.querySelectorAll(".nav-btn").forEach((button) => {
        button.classList.toggle("active", button.dataset.tab === active);
      });
    }

    function setHeader(title, showBack = false) {
      screenTitleEl.textContent = title;
      backButtonEl.classList.toggle("hidden", !showBack);
    }

    function render() {
      syncNav();

      const isDetail = state.screen === "detail";
      const isSubscreen = state.screen === "detail" || state.screen === "habit";

      appEl.classList.toggle("with-detail-dock", isDetail);
      detailDockEl.classList.toggle("active", isDetail);
      bottomNavEl.classList.toggle("hidden-in-subscreen", isSubscreen);

      if (state.screen === "detail") {
        setHeader(getDisplayLabel(state.zikrId), true);
        appEl.innerHTML = renderDetail(state.zikrId);
        detailDockEl.innerHTML = renderDetailDock(state.zikrId);
        bindDetailActions();
        return;
      }

      detailDockEl.innerHTML = "";

      if (state.screen === "category") {
        setHeader(CATEGORY_META[state.currentCategory].title, true);
        appEl.innerHTML = renderCategory(state.currentCategory);
        bindCategoryActions();
        return;
      }

      if (state.screen === "habit") {
        setHeader("Дневник привычек", true);
        appEl.innerHTML = renderHabitJournal();
        bindHabitActions();
        return;
      }

      if (state.screen === "stats") {
        setHeader("Статистика");
        appEl.innerHTML = renderStats();
        bindStatsActions();
        return;
      }

      setHeader("Мои зикры");
      appEl.innerHTML = renderMine();
      bindMineActions();
    }

    function renderCategoryCard(category) {
      const meta = CATEGORY_META[category];
      const stats = getCategoryStats(category);

      return `
        <button class="category-card" data-category="${category}">
          <div class="category-card-main">
            <div class="category-card-title">${meta.title}</div>
            <div class="category-card-sub">Сегодня выполнено ${stats.completed}/${stats.total}</div>
            <div class="substat">Всего прочитано: ${stats.allTimeTotal}</div>
          </div>
          <span class="category-badge">${stats.total}</span>
        </button>
      `;
    }

    function renderZikrRow(zikr) {
      const todayCount = getCount(zikr.id);
      const allTimeCount = getAllTimeCount(zikr.id);

      return `
        <button class="list-row zikr-row" data-zikr-id="${zikr.id}">
          <div class="list-row-main">
            <div class="list-row-title">${getDisplayLabel(zikr.id)}</div>
            <div class="muted">Сегодня ${todayCount} / ${zikr.target}</div>
            <div class="substat">Всего прочитано: ${allTimeCount}</div>
          </div>
          ${isDone(zikr.id)
            ? '<span class="status-badge done">✅</span>'
            : `<span class="count-badge">${zikr.target}</span>`}
        </button>
      `;
    }

    function renderMine() {
      return `
        <section class="screen">
          ${renderCategoryCard("morning")}
          ${renderCategoryCard("evening")}
          ${renderCategoryCard("daily")}
        </section>
      `;
    }

    function renderCategory(category) {
      const items = getAllZikrs(category);

      if (!items.length) {
        return `
          <section class="screen">
            <div class="card empty-state">
              <h3>В этом разделе пока нет зикров</h3>
              <div class="muted">Нажмите плюс сверху, чтобы добавить новый зикр.</div>
            </div>
          </section>
        `;
      }

      return `
        <section class="screen">
          ${items.map((zikr) => renderZikrRow(zikr)).join("")}
        </section>
      `;
    }

    function renderDetail(zikrId) {
      const zikr = getZikrById(zikrId);
      if (!zikr) {
        return `
          <section class="screen">
            <div class="card empty-state">
              <h3>Зикр не найден</h3>
            </div>
          </section>
        `;
      }

      return `
        <section class="screen">
          <div class="card detail-header">
            ${zikr.arabic ? `<div class="arabic">${zikr.arabic}</div>` : ""}
            ${zikr.transliteration ? `<div class="transliteration">${zikr.transliteration}</div>` : ""}
            ${zikr.translation ? `<div class="translation">${zikr.translation}</div>` : ""}
          </div>
        </section>
      `;
    }

    function renderDetailDock(zikrId) {
      const zikr = getZikrById(zikrId);
      if (!zikr) return "";

      const count = getCount(zikr.id);
      const done = isDone(zikr.id);
      const progress = zikr.target ? Math.min(100, Math.round((count / zikr.target) * 100)) : 0;
      const hasMany = getAllZikrs(state.currentCategory).length > 1;

      return `
        <div class="detail-dock-card">
          <button class="tap-panel" id="incrementPanelBtn" aria-label="Добавить повтор">
            <div class="tap-progress">
              <div class="tap-progress-fill" style="width:${progress}%"></div>
            </div>

            <div class="tap-count">${count}</div>

            ${
              done
                ? '<div class="tap-done">Выполнено сегодня ✅</div>'
                : `<div class="tap-progress-text">${count}/${zikr.target}</div>`
            }

            <div class="tap-hint">Нажмите на счетчик</div>
          </button>

          <div class="dock-footer">
            <button class="arrow-btn" id="prevZikrBtn" ${hasMany ? "" : "disabled"}>‹</button>
            <button class="secondary-button dock-btn" id="manageBtn">Опции</button>
            <button class="arrow-btn" id="nextZikrBtn" ${hasMany ? "" : "disabled"}>›</button>
          </div>
        </div>
      `;
    }

    function renderStats() {
      const todayStats = getTodayStats();

      return `
        <section class="screen">
          <div class="stat-grid">
            <div class="stat-box">
              <strong>${todayStats.completed}/${todayStats.total}</strong>
              <span>Выполнено сегодня</span>
            </div>

            <div class="stat-box progress-stat">
              <strong>${todayStats.percent}%</strong>
              <span>Прогресс дня</span>
              <div class="progress-track">
                <div class="progress-fill-green" style="width:${todayStats.percent}%"></div>
              </div>
            </div>

            <div class="stat-box">
              <strong>${getActiveStreak()}</strong>
              <span>Дней подряд</span>
            </div>
          </div>

          <button class="diary-open-btn" id="openHabitJournalBtn">
            <div>
              <div class="diary-open-title">Дневник привычек</div>
              <div class="diary-open-subtitle">Открой календарь активности и посмотри, какие дни были выполнены.</div>
            </div>
            <div class="diary-open-icon">→</div>
          </button>
        </section>
      `;
    }

    function renderHabitJournal() {
      const month = getMonthModel(state.calendarOffset);
      const monthActivity = getMonthActivity(state.calendarOffset);
      const weekdays = ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Вс"];

      return `
        <section class="screen">
          <div class="card">
            <div class="calendar-head">
              <div>
                <h3 style="margin:0; text-transform: capitalize;">Дневник привычек</h3>
                <div class="muted">День закрывается, когда выполнены все добавленные ежедневные зикры.</div>
              </div>
              <div class="calendar-nav">
                <button class="ghost-button month-switch" id="prevMonthBtn">←</button>
                <button class="ghost-button month-switch" id="nextMonthBtn">→</button>
              </div>
            </div>

            <div class="mini-stats-row">
              <span class="mini-stat">${month.monthLabel}</span>
              <span class="mini-stat">Активных дней: <strong>${monthActivity.activeDays}</strong></span>
              <span class="mini-stat">Закрытых дней: <strong>${monthActivity.doneDays}</strong></span>
            </div>

            <div class="calendar-weekdays">
              ${weekdays.map((day) => `<div class="weekday-cell">${day}</div>`).join("")}
            </div>

            <div class="calendar-grid">
              ${month.cells.map((item) => {
                if (item.empty) return '<div class="calendar-cell empty"></div>';

                return `
                  <div class="calendar-cell ${item.isToday ? "today" : ""} ${item.allDone ? "done" : ""} ${item.active && !item.allDone ? "active" : ""}">
                    <div class="calendar-day">${item.dayNumber}</div>
                    <div class="calendar-mark">${item.allDone ? "✅" : item.active ? `${item.totalRepeats}` : "—"}</div>
                  </div>
                `;
              }).join("")}
            </div>
          </div>
        </section>
      `;
    }

    function bindMineActions() {
      appEl.querySelectorAll(".category-card").forEach((button) => {
        button.addEventListener("click", () => {
          state.currentCategory = button.dataset.category;
          state.screen = "category";
          render();
          afterRenderTop();
        });
      });
    }

    function bindCategoryActions() {
      appEl.querySelectorAll(".zikr-row").forEach((button) => {
        button.addEventListener("click", () => {
          const zikr = getZikrById(button.dataset.zikrId);
          state.zikrId = zikr.id;
          state.currentCategory = zikr.category || "daily";
          state.screen = "detail";
          render();
          afterRenderTop();
        });
      });
    }

    function bindStatsActions() {
      const openHabitJournalBtn = document.getElementById("openHabitJournalBtn");
      openHabitJournalBtn?.addEventListener("click", () => {
        state.screen = "habit";
        render();
        afterRenderTop();
      });
    }

    function bindHabitActions() {
      const prevMonthBtn = document.getElementById("prevMonthBtn");
      const nextMonthBtn = document.getElementById("nextMonthBtn");

      prevMonthBtn?.addEventListener("click", () => {
        state.calendarOffset -= 1;
        render();
        afterRenderTop();
      });

      nextMonthBtn?.addEventListener("click", () => {
        state.calendarOffset += 1;
        render();
        afterRenderTop();
      });
    }

    function bindDetailActions() {
      const incrementPanelBtn = document.getElementById("incrementPanelBtn");
      const manageBtn = document.getElementById("manageBtn");
      const prevZikrBtn = document.getElementById("prevZikrBtn");
      const nextZikrBtn = document.getElementById("nextZikrBtn");

      incrementPanelBtn?.addEventListener("click", () => {
        incrementZikr(state.zikrId);
      });

      manageBtn?.addEventListener("click", () => {
        openManageDialog();
      });

      prevZikrBtn?.addEventListener("click", () => {
        goToPrevZikr();
      });

      nextZikrBtn?.addEventListener("click", () => {
        goToNextZikr();
      });
    }

    forceTop();
  </script>
</body>
</html>
