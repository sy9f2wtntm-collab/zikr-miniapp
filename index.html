<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
  />
  <title>Мои зикры</title>
  <meta name="theme-color" content="#0b1830" />
  <script src="https://telegram.org/js/telegram-web-app.js?60"></script>

  <style>
    :root {
      --bg-top: #08111f;
      --bg-mid: #0d2138;
      --bg-bottom: #102743;

      --gold: #e4c98d;
      --gold-soft: rgba(228, 201, 141, 0.18);
      --gold-line: rgba(228, 201, 141, 0.58);

      --cyan: #67d5e3;
      --cyan-soft: rgba(103, 213, 227, 0.18);

      --panel: rgba(7, 18, 32, 0.76);
      --panel-2: rgba(11, 26, 45, 0.78);
      --panel-light: rgba(255, 249, 238, 0.96);

      --text: #f7e8c6;
      --text-soft: rgba(247, 232, 198, 0.78);
      --dark-text: #172133;
      --dark-soft: #5d6678;

      --success: #27bf72;
      --success-soft: rgba(39, 191, 114, 0.14);

      --shadow: 0 16px 42px rgba(0, 0, 0, 0.28);
      --blur: blur(14px);

      --radius-xl: 30px;
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 14px;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      overflow-anchor: none;
      touch-action: manipulation;
      overscroll-behavior: none;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 50% 10%, rgba(255, 214, 133, 0.18), transparent 18%),
        radial-gradient(circle at 50% 28%, rgba(92, 214, 229, 0.10), transparent 24%),
        linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 45%, var(--bg-bottom) 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.18;
      background:
        radial-gradient(circle at 50% 50%, transparent 0 32px, rgba(228, 201, 141, 0.55) 32px 34px, transparent 34px),
        radial-gradient(circle at 0 0, transparent 0 24px, rgba(228, 201, 141, 0.4) 24px 26px, transparent 26px),
        radial-gradient(circle at 100% 0, transparent 0 24px, rgba(228, 201, 141, 0.4) 24px 26px, transparent 26px),
        radial-gradient(circle at 0 100%, transparent 0 24px, rgba(228, 201, 141, 0.4) 24px 26px, transparent 26px),
        radial-gradient(circle at 100% 100%, transparent 0 24px, rgba(228, 201, 141, 0.4) 24px 26px, transparent 26px);
      background-size: 220px 220px;
      background-position: center;
      mix-blend-mode: screen;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      border: none;
      background: transparent;
      cursor: pointer;
    }

    body {
      display: flex;
      justify-content: center;
    }

    .app-shell {
      position: relative;
      width: min(100%, 500px);
      min-height: 100vh;
      padding: 14px 16px 104px;
      z-index: 1;
    }

    .topbar {
      display: grid;
      grid-template-columns: 58px 1fr 58px;
      gap: 10px;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 30;
      padding: 8px 0 12px;
      background: linear-gradient(to bottom, rgba(8, 17, 31, 0.92) 64%, rgba(8, 17, 31, 0));
      backdrop-filter: blur(8px);
    }

    .icon-button {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: var(--gold);
      font-size: 28px;
      background: rgba(255, 249, 238, 0.12);
      border: 1px solid rgba(255, 249, 238, 0.18);
      box-shadow: var(--shadow);
      backdrop-filter: var(--blur);
    }

    .icon-button:active {
      transform: scale(0.98);
    }

    .search-pill {
      min-height: 58px;
      border-radius: 999px;
      padding: 0 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 22px;
      font-weight: 800;
      color: var(--gold);
      background: rgba(255, 248, 236, 0.14);
      border: 1px solid rgba(255, 248, 236, 0.22);
      box-shadow: var(--shadow);
      backdrop-filter: var(--blur);
    }

    .hidden {
      visibility: hidden;
    }

    .screen {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #app.with-detail-dock {
      padding-bottom: 310px;
    }

    .hero-panel {
      position: relative;
      height: 245px;
      margin-top: -6px;
      margin-bottom: -135px;
      overflow: hidden;
      pointer-events: none;
    }

    .hero-glow {
      position: absolute;
      inset: 12px 20px 0;
      border-radius: 34px;
      background:
        radial-gradient(circle at 50% 46%, rgba(255, 222, 153, 0.44), rgba(255, 222, 153, 0.08) 36%, transparent 58%);
      filter: blur(18px);
      opacity: 0.95;
    }

    .hero-arch {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      bottom: 10px;
      width: 78%;
      height: 190px;
      border: 2px solid var(--gold-line);
      border-radius: 40px 40px 28px 28px;
      box-shadow: inset 0 0 24px rgba(228, 201, 141, 0.12);
    }

    .hero-arch::before {
      content: "";
      position: absolute;
      left: 50%;
      top: -66px;
      transform: translateX(-50%);
      width: 55%;
      height: 84px;
      border: 2px solid var(--gold-line);
      border-bottom: none;
      border-radius: 160px 160px 0 0;
    }

    .hero-mosque {
      position: absolute;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      width: 58%;
      height: 150px;
      opacity: 0.94;
    }

    .hero-mosque .base {
      position: absolute;
      left: 50%;
      bottom: 0;
      transform: translateX(-50%);
      width: 76%;
      height: 52px;
      background: linear-gradient(180deg, rgba(255, 228, 165, 0.88), rgba(255, 228, 165, 0.46));
      border-radius: 10px 10px 0 0;
      filter: drop-shadow(0 0 18px rgba(255, 218, 138, 0.28));
    }

    .hero-mosque .dome {
      position: absolute;
      left: 50%;
      bottom: 38px;
      transform: translateX(-50%);
      width: 42%;
      height: 76px;
      background: linear-gradient(180deg, rgba(255, 235, 188, 0.92), rgba(255, 221, 150, 0.52));
      border-radius: 120px 120px 16px 16px;
      filter: drop-shadow(0 0 16px rgba(255, 218, 138, 0.2));
    }

    .hero-mosque .minaret {
      position: absolute;
      bottom: 32px;
      width: 9%;
      height: 100px;
      background: linear-gradient(180deg, rgba(255, 235, 188, 0.9), rgba(255, 221, 150, 0.48));
      border-radius: 999px 999px 0 0;
    }

    .hero-mosque .minaret.left {
      left: 14%;
    }

    .hero-mosque .minaret.right {
      right: 14%;
    }

    .hero-mosque .crescent {
      position: absolute;
      left: 50%;
      bottom: 112px;
      transform: translateX(-50%);
      font-size: 28px;
      color: rgba(255, 232, 182, 0.9);
      text-shadow: 0 0 18px rgba(255, 218, 138, 0.24);
    }

    .mine-screen {
      gap: 12px;
    }

    .category-stack {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .glass-card,
    .list-row,
    .category-card,
    .stat-box,
    .diary-open-btn,
    .calendar-card {
      background: linear-gradient(180deg, rgba(7, 20, 35, 0.78), rgba(9, 27, 46, 0.74));
      border: 1.2px solid rgba(228, 201, 141, 0.52);
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
    }

    .category-card,
    .list-row {
      width: 100%;
      padding: 18px;
      border-radius: var(--radius-xl);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      text-align: left;
      position: relative;
      overflow: hidden;
    }

    .category-card::before,
    .list-row::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 75% 20%, rgba(91, 214, 229, 0.13), transparent 24%),
        radial-gradient(circle at 50% 55%, rgba(255, 214, 133, 0.12), transparent 40%);
      pointer-events: none;
    }

    .category-card-main,
    .list-row-main {
      position: relative;
      z-index: 2;
      min-width: 0;
      flex: 1;
    }

    .category-card-title,
    .list-row-title {
      color: var(--gold);
      font-size: 19px;
      font-weight: 800;
      margin-bottom: 7px;
    }

    .category-card-sub {
      color: rgba(247, 232, 198, 0.92);
      font-size: 15px;
      line-height: 1.45;
      margin-bottom: 6px;
    }

    .list-row-note {
      color: var(--text-soft);
      font-size: 14px;
      line-height: 1.4;
      margin-bottom: 6px;
    }

    .muted {
      color: var(--text-soft);
    }

    .substat {
      color: var(--cyan);
      font-size: 14px;
      font-weight: 700;
    }

    .category-badge,
    .count-badge,
    .status-badge {
      position: relative;
      z-index: 2;
      min-width: 70px;
      height: 70px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 18px;
      font-weight: 900;
      box-shadow: inset 0 0 24px rgba(255, 255, 255, 0.04);
    }

    .category-badge,
    .count-badge {
      background: radial-gradient(circle at 35% 30%, rgba(98, 217, 231, 0.34), rgba(34, 133, 160, 0.82));
      color: #f6f7f8;
      border: 1px solid rgba(103, 213, 227, 0.35);
    }

    .status-badge {
      background: radial-gradient(circle at 35% 30%, rgba(58, 212, 122, 0.36), rgba(24, 145, 78, 0.88));
      color: white;
      border: 1px solid rgba(39, 191, 114, 0.46);
      font-size: 28px;
    }

    .section-hero-title {
      padding: 0 8px;
      font-size: 13px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(228, 201, 141, 0.82);
      text-align: center;
    }

    .reading-card {
      background: linear-gradient(180deg, rgba(255, 251, 243, 0.97), rgba(255, 247, 232, 0.94));
      border: 1px solid rgba(228, 201, 141, 0.48);
      border-radius: 30px;
      box-shadow: var(--shadow);
      padding: 22px 22px 30px;
      color: var(--dark-text);
    }

    .reading-topline {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .reading-chip {
      min-height: 34px;
      padding: 0 14px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 800;
      color: #7d6640;
      background: rgba(228, 201, 141, 0.18);
      border: 1px solid rgba(228, 201, 141, 0.28);
    }

    .reading-title {
      margin: 0 0 14px;
      color: #2d3545;
      font-size: 22px;
      font-weight: 800;
      line-height: 1.3;
      text-align: center;
    }

    .arabic {
      direction: rtl;
      text-align: center;
      font-size: 31px;
      line-height: 1.95;
      margin: 0 0 18px;
      word-break: break-word;
      color: #121927;
      font-weight: 700;
    }

    .transliteration {
      color: #425069;
      line-height: 1.8;
      font-size: 18px;
      font-weight: 800;
      word-break: break-word;
      margin-bottom: 18px;
      text-align: center;
    }

    .translation {
      color: #4e5a72;
      line-height: 1.8;
      font-size: 18px;
      word-break: break-word;
      text-align: center;
    }

    .detail-dock {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      bottom: 16px;
      width: min(calc(100% - 24px), 468px);
      z-index: 25;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s ease;
    }

    .detail-dock.active {
      opacity: 1;
      pointer-events: auto;
    }

    .detail-dock-card {
      padding: 14px;
      border-radius: 28px;
      background: rgba(6, 18, 33, 0.9);
      border: 1px solid rgba(228, 201, 141, 0.45);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .tap-panel {
      width: 100%;
      min-height: 168px;
      border-radius: 24px;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 216, 139, 0.08), transparent 26%),
        radial-gradient(circle at 80% 80%, rgba(103, 213, 227, 0.1), transparent 24%),
        linear-gradient(180deg, rgba(13, 35, 56, 0.94), rgba(9, 24, 40, 0.94));
      border: 1px solid rgba(228, 201, 141, 0.22);
      padding: 12px 14px 14px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      text-align: center;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
    }

    .tap-panel.done-state {
      justify-content: flex-start;
      padding-top: 12px;
      padding-bottom: 18px;
    }

    .tap-panel.done-state .tap-progress {
      background: rgba(39, 191, 114, 0.18);
    }

    .tap-progress {
      width: 100%;
      height: 6px;
      border-radius: 999px;
      background: rgba(103, 213, 227, 0.14);
      overflow: hidden;
    }

    .tap-progress-fill {
      height: 100%;
      border-radius: 999px;
      background: linear-gradient(90deg, #6bd9e6 0%, #25b6c9 100%);
      width: 0%;
      transition: width 0.18s ease;
    }

    .tap-count {
      font-size: 64px;
      line-height: 1;
      font-weight: 500;
      color: var(--gold);
      margin-top: 4px;
      text-shadow: 0 0 20px rgba(255, 214, 133, 0.12);
    }

    .tap-progress-text {
      font-size: 20px;
      font-weight: 800;
      color: rgba(247, 232, 198, 0.92);
      line-height: 1.15;
      margin-top: -2px;
    }

    .tap-complete-wrap {
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 10px 6px 2px;
    }

    .tap-complete-icon {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      font-size: 34px;
      font-weight: 900;
      color: white;
      background: linear-gradient(180deg, rgba(48, 186, 111, 1), rgba(29, 153, 83, 1));
      box-shadow: 0 12px 30px rgba(29, 153, 83, 0.28);
    }

    .tap-complete-title {
      font-size: 24px;
      font-weight: 900;
      color: #f4f8f5;
      line-height: 1.15;
      text-align: center;
    }

    .tap-complete-sub {
      font-size: 14px;
      font-weight: 700;
      color: rgba(210, 242, 223, 0.86);
      text-align: center;
    }

    .tap-hint {
      color: rgba(247, 232, 198, 0.7);
      font-size: 13px;
      font-weight: 700;
    }

    .dock-footer {
      display: grid;
      grid-template-columns: 48px 1fr 48px;
      gap: 10px;
      align-items: center;
    }

    .arrow-btn {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: rgba(255, 248, 236, 0.12);
      border: 1px solid rgba(255, 248, 236, 0.18);
      color: var(--gold);
      font-size: 24px;
      font-weight: 900;
    }

    .arrow-btn:disabled {
      opacity: 0.4;
    }

    .dock-btn {
      min-height: 48px;
      padding: 0 18px;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(103, 213, 227, 0.16), rgba(103, 213, 227, 0.08));
      border: 1px solid rgba(103, 213, 227, 0.24);
      color: var(--cyan);
      font-size: 17px;
      font-weight: 800;
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: 14px;
      transform: translateX(-50%);
      width: min(calc(100% - 24px), 468px);
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      padding: 10px;
      border-radius: 24px;
      background: rgba(8, 20, 34, 0.82);
      border: 1px solid rgba(228, 201, 141, 0.36);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      z-index: 35;
      transition: opacity 0.18s ease, visibility 0.18s ease, transform 0.18s ease;
    }

    .bottom-nav.hidden-in-subscreen {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateX(-50%) translateY(20px);
    }

    .nav-btn {
      min-height: 54px;
      border-radius: 18px;
      font-weight: 800;
      font-size: 18px;
      color: rgba(247, 232, 198, 0.74);
      position: relative;
    }

    .nav-btn.active {
      color: var(--cyan);
      background:
        radial-gradient(circle at 25% 30%, rgba(103, 213, 227, 0.18), transparent 34%),
        linear-gradient(180deg, rgba(103, 213, 227, 0.14), rgba(103, 213, 227, 0.06));
      border: 1px solid rgba(103, 213, 227, 0.18);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.04);
    }

    .stats-grid-categories {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .stat-box {
      min-height: 128px;
      border-radius: 24px;
      padding: 18px;
      position: relative;
      overflow: hidden;
    }

    .stat-box strong {
      position: relative;
      z-index: 2;
      display: block;
      margin-bottom: 10px;
      font-size: 34px;
      line-height: 1;
      color: var(--gold);
    }

    .stat-box span {
      position: relative;
      z-index: 2;
      color: var(--text-soft);
      font-size: 15px;
      line-height: 1.4;
    }

    .progress-stat strong {
      color: #66d76d;
    }

    .progress-track {
      position: relative;
      z-index: 2;
      width: 100%;
      height: 10px;
      margin-top: 14px;
      border-radius: 999px;
      background: rgba(39, 191, 114, 0.12);
      overflow: hidden;
    }

    .progress-fill-green {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #24c86f 0%, #7fe08a 100%);
      transition: width 0.2s ease;
    }

    .diary-open-btn {
      width: 100%;
      text-align: left;
      border-radius: 28px;
      padding: 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
    }

    .diary-open-title {
      font-size: 28px;
      font-weight: 900;
      color: var(--gold);
      margin-bottom: 8px;
    }

    .diary-open-subtitle {
      color: var(--text-soft);
      line-height: 1.5;
      font-size: 16px;
      max-width: 280px;
    }

    .diary-open-icon {
      width: 60px;
      height: 60px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      background: rgba(255, 248, 236, 0.12);
      border: 1px solid rgba(255, 248, 236, 0.18);
      color: var(--gold);
      font-size: 28px;
      font-weight: 900;
      flex-shrink: 0;
    }

    .calendar-card {
      border-radius: 28px;
      padding: 22px;
    }

    .calendar-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 14px;
    }

    .calendar-title {
      margin: 0 0 8px;
      color: var(--gold);
      font-size: 26px;
      font-weight: 900;
    }

    .calendar-nav {
      display: flex;
      gap: 8px;
    }

    .month-switch {
      min-height: 44px;
      min-width: 44px;
      border-radius: 14px;
      background: rgba(255, 248, 236, 0.12);
      border: 1px solid rgba(255, 248, 236, 0.18);
      color: var(--gold);
      font-weight: 900;
      font-size: 22px;
    }

    .mini-stats-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    .mini-stat {
      min-height: 40px;
      padding: 0 14px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(255, 248, 236, 0.1);
      border: 1px solid rgba(255, 248, 236, 0.12);
      color: var(--text-soft);
      font-size: 14px;
      font-weight: 700;
    }

    .calendar-weekdays,
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
    }

    .calendar-weekdays {
      margin-bottom: 8px;
    }

    .weekday-cell {
      text-align: center;
      color: rgba(247, 232, 198, 0.78);
      font-size: 13px;
      font-weight: 800;
    }

    .calendar-cell {
      min-height: 70px;
      border-radius: 18px;
      padding: 10px 6px;
      background: rgba(255, 250, 240, 0.9);
      color: #1e2736;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      box-shadow: inset 0 0 0 1px rgba(228, 201, 141, 0.2);
    }

    .calendar-cell.empty {
      background: transparent;
      box-shadow: none;
    }

    .calendar-cell.today {
      outline: 2px solid rgba(103, 213, 227, 0.7);
      outline-offset: 0;
    }

    .calendar-cell.active {
      background: rgba(215, 241, 245, 0.95);
    }

    .calendar-cell.done {
      background: rgba(206, 246, 220, 0.96);
    }

    .calendar-day {
      font-weight: 900;
      font-size: 18px;
    }

        translation: "О Живой, о Управляющий всем сущим, посредством Твоей милости прошу о помощи, приведи для меня в порядок все мои дела и не доверяй меня душе моей ни на мгновение.",

        translation: "Достаточно мне Аллаха, кроме Которого нет бога, достойного поклонения. Я уповаю только на Него, ведь Он — Господь величественного Арша.",
        target: 7
      }
    ];

    const EVENING_ZIKRS = MORNING_ZIKRS.map((item) => ({ ...item }));

    const DAILY_ZIKRS = [
      {
        title: "Повседневный зикр 1",
        arabic: "لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِٱللَّهِ",

      },
      {
        title: "Повседневный зикр 2",
        arabic: "لَا إِلَٰهَ إِلَّا ٱللَّهُ",
        transliteration: "Ля иляха илля Ллах.",
        translation: "Нет божества, достойного поклонения, кроме Аллаха.",
        target: 100
      },
      {
        title: "Повседневный зикр 3",
        arabic: "رَبِّ إِنِّي لِمَا أَنزَلْتَ إِلَيَّ مِنْ خَيْرٍ فَقِيرٌ",
        transliteration: "Рабби инни лима анзальта иляййа мин хайрин факир.",
        translation: "Господь мой, поистине я нуждаюсь в любом благе, которое Ты ниспошлёшь мне.",
        target: 100
      },
      {
        title: "Повседневный зикр 4",
        arabic: "أَسْتَغْفِرُ ٱللَّهَ",
        transliteration: "Астагфируллах.",
        translation: "Я прошу прощения у Аллаха.",
        target: 100
      },
      {
        title: "Повседневный зикр 5",
        arabic: "ٱللَّهُمَّ صَلِّ عَلَىٰ مُحَمَّدٍ وَعَلَىٰ آلِ مُحَمَّدٍ",
        transliteration: "Аллахумма салли аля Мухаммад ва аля али Мухаммад.",
        translation: "О Аллах, благослови Мухаммада и семейство Мухаммада.",
        target: 100
      },
      {
        title: "Повседневный зикр 6",
        arabic: "لَا إِلَٰهَ إِلَّا ٱللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ لَهُ ٱلْمُلْكُ وَلَهُ ٱلْحَمْدُ وَهُوَ عَلَىٰ كُلِّ شَيْءٍ قَدِيرٌ",
        transliteration: "Ля иляха илля Ллаху вахдаху, ля шарика лях, ляху-ль-мульку ва ляху-ль-хамду, ва хува аля кулли шайин кадир.",
        translation: "Нет божества, достойного поклонения, кроме одного Аллаха, у Которого нет сотоварища. Ему принадлежит власть и хвала, и Он мощен над всякой вещью.",
        target: 100
      },
      {
        title: "Повседневный зикр 7",
        arabic: "لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِٱللَّهِ ٱلْعَلِيِّ ٱلْعَظِيمِ",
        transliteration: "Ля хауля ва ля куввата илля биЛляхи-ль-Алиййи-ль-Азым.",
        translation: "Нет силы и мощи ни у кого, кроме Аллаха, Возвышенного, Великого.",
        target: 100
      },
      {
        title: "Повседневный зикр 8",
        arabic: "أَسْتَغْفِرُ ٱللَّهَ وَأَتُوبُ إِلَيْهِ",
        transliteration: "Астагфируллаха ва атубу иляйх.",
        translation: "Я прошу у Аллаха прощения и каюсь перед Ним.",

      },
      {
        title: "Повседневный зикр 9",
        arabic: "حَسْبِيَ ٱللَّهُ لَا إِلَٰهَ إِلَّا هُوَ عَلَيْهِ تَوَكَّلْتُ وَهُوَ رَبُّ ٱلْعَرْشِ ٱلْعَظِيمِ",
        transliteration: "Хасбия-Ллаху, ля иляха илля Хува, аляйхи таваккальту, ва хува Раббу-ль-‘Арши-ль-‘Азым.",
        translation: "Мне достаточно Аллаха. Нет божества, кроме Него. На Него я уповаю, и Он — Господь Великого Трона.",
        target: 100
      },
      {
        title: "Повседневный зикр 10",
        arabic: "لَا إِلَٰهَ إِلَّا أَنتَ سُبْحَانَكَ إِنِّي كُنتُ مِنَ ٱلظَّٰلِمِينَ",
        transliteration: "Ля иляха илля Анта, субханака, инни кунту мина-з-залимин.",
        translation: "Нет божества, достойного поклонения, кроме Тебя. Пречист Ты. Воистину, я был из числа беззаконников.",
        target: 100
      }
    ];

    const seedData = {
      customZikrs: [
        ...MORNING_ZIKRS.map((item, index) => ({
          id: `seed-morning-${index + 1}`,
          category: "morning",
          ...item
        })),
        ...EVENING_ZIKRS.map((item, index) => ({
          id: `seed-evening-${index + 1}`,
          category: "evening",
          ...item
        })),
        ...DAILY_ZIKRS.map((item, index) => ({
          id: `seed-daily-${index + 1}`,
          category: "daily",
          ...item
        }))
      ],
      progressByDate: {}
    };

    const state = {
      screen: "mine",
      zikrId: null,
      currentCategory: "morning",
      calendarOffset: 0,
      data: loadData()
    };

    const appEl = document.getElementById("app");
    const screenTitleEl = document.getElementById("screenTitle");
    const backButtonEl = document.getElementById("backButton");
    const addQuickButtonEl = document.getElementById("addQuickButton");
    const dialogEl = document.getElementById("zikrDialog");
    const closeDialogEl = document.getElementById("closeDialog");
    const zikrFormEl = document.getElementById("zikrForm");
    const dialogTitleEl = document.getElementById("dialogTitle");
    const submitDialogButtonEl = document.getElementById("submitDialogButton");
    const detailDockEl = document.getElementById("detailDock");
    const bottomNavEl = document.getElementById("bottomNav");
    const manageDialogEl = document.getElementById("manageDialog");
    const closeManageDialogEl = document.getElementById("closeManageDialog");
    const manageEditBtnEl = document.getElementById("manageEditBtn");
    const manageResetBtnEl = document.getElementById("manageResetBtn");
    const manageDeleteBtnEl = document.getElementById("manageDeleteBtn");
    const manageTitleEl = document.getElementById("manageTitle");
    const manageTotalValueEl = document.getElementById("manageTotalValue");

    attachEvents();
    render();
    forceTop();

    function loadData() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return structuredClone(seedData);

      try {
        const parsed = JSON.parse(raw);
        return {
          customZikrs: Array.isArray(parsed.customZikrs)
            ? parsed.customZikrs.map((item) => ({
                ...item,
                category: item.category || "daily"
              }))
            : structuredClone(seedData.customZikrs),
          progressByDate: parsed.progressByDate || {}
        };
      } catch (_error) {
        return structuredClone(seedData);
      }
    }

    function saveData() {
      localStorage.setItem(
        STORAGE_KEY,
        JSON.stringify({
          customZikrs: state.data.customZikrs,
          progressByDate: state.data.progressByDate
        })
      );
    }

    function scrollToTopNow() {
      window.scrollTo({ top: 0, left: 0, behavior: "auto" });
      document.documentElement.scrollTop = 0;
      document.body.scrollTop = 0;
      appEl.scrollTop = 0;
    }

    function forceTop() {
      scrollToTopNow();
      requestAnimationFrame(scrollToTopNow);
      setTimeout(scrollToTopNow, 0);
      setTimeout(scrollToTopNow, 80);
      setTimeout(scrollToTopNow, 180);
      setTimeout(scrollToTopNow, 320);
    }

    function afterRenderTop() {
      setTimeout(forceTop, 0);
    }

    function attachEvents() {
      backButtonEl.addEventListener("click", handleBack);

      addQuickButtonEl.addEventListener("click", () => {
        openCreateDialog(state.screen === "category" ? state.currentCategory : "daily");
      });

      closeDialogEl.addEventListener("click", () => dialogEl.close());
      closeManageDialogEl.addEventListener("click", () => manageDialogEl.close());

      dialogEl.addEventListener("click", (e) => {
        if (e.target === dialogEl) dialogEl.close();
      });

      manageDialogEl.addEventListener("click", (e) => {
        if (e.target === manageDialogEl) manageDialogEl.close();
      });

      zikrFormEl.addEventListener("submit", (event) => {
        event.preventDefault();

        const formData = new FormData(zikrFormEl);
        const existingId = String(formData.get("id") || "").trim();
        const target = Math.max(1, Number(formData.get("target")) || 1);
        const category = String(formData.get("category") || "daily");

        const payload = {
          category,
          title: String(formData.get("title") || "").trim(),
          arabic: String(formData.get("arabic") || "").trim(),
          transliteration: String(formData.get("transliteration") || "").trim(),
          translation: String(formData.get("translation") || "").trim(),
          target
        };

        if (existingId) {
          const zikr = getZikrById(existingId);
          if (zikr) {
            Object.assign(zikr, payload);
            Object.values(state.data.progressByDate).forEach((dayProgress) => {
              if (typeof dayProgress[existingId] !== "undefined") {
                dayProgress[existingId] = Math.min(Number(dayProgress[existingId] || 0), target);
              }
            });
          }
          state.zikrId = existingId;
          state.currentCategory = category;
        } else {
          const id = `custom-${Date.now()}`;
          state.data.customZikrs.unshift({ id, ...payload, isCustom: true });
          state.zikrId = id;
          state.currentCategory = category;
        }

        saveData();
        zikrFormEl.reset();
        dialogEl.close();
        state.screen = "detail";
        render();
        afterRenderTop();
      });

      document.querySelectorAll(".nav-btn").forEach((button) => {
        button.addEventListener("click", () => {
          state.screen = button.dataset.tab;
          state.zikrId = null;
          render();
          afterRenderTop();
        });
      });

      manageEditBtnEl.addEventListener("click", () => {
        manageDialogEl.close();
        openEditDialog(state.zikrId);
      });

      manageResetBtnEl.addEventListener("click", () => {
        manageDialogEl.close();
        resetZikr(state.zikrId);
      });

      manageDeleteBtnEl.addEventListener("click", () => {
        manageDialogEl.close();
        deleteCurrentZikr();
      });
    }

    function getAllZikrs(category = null) {
      if (!category) return state.data.customZikrs;
      return state.data.customZikrs.filter((item) => (item.category || "daily") === category);
    }

    function getZikrById(zikrId) {
      return state.data.customZikrs.find((item) => item.id === zikrId);
    }

    function getZikrIndex(zikrId) {
      const zikr = getZikrById(zikrId);
      if (!zikr) return -1;
      return getAllZikrs(zikr.category).findIndex((item) => item.id === zikrId);
    }

    function getDisplayLabel(zikrId) {
      const index = getZikrIndex(zikrId);
      return index >= 0 ? `Зикр ${index + 1}` : "Зикр";
    }

    function getTodayKey() {
      return getDateKey(new Date());
    }

    function getDateKey(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
    }

    function ensureDateProgress(dateKey = getTodayKey()) {
      if (!state.data.progressByDate[dateKey]) {
        state.data.progressByDate[dateKey] = {};
      }
      return state.data.progressByDate[dateKey];
    }

    function getCount(zikrId, dateKey = getTodayKey()) {
      const dayProgress = state.data.progressByDate[dateKey] || {};
      return Number(dayProgress[zikrId] || 0);
    }

    function setCount(zikrId, count, dateKey = getTodayKey()) {
      const zikr = getZikrById(zikrId);
      if (!zikr) return;
      const safeCount = Math.max(0, Math.min(zikr.target, count));
      const dayProgress = ensureDateProgress(dateKey);
      dayProgress[zikrId] = safeCount;
      saveData();
    }

    function getAllTimeCount(zikrId) {
      return Object.values(state.data.progressByDate).reduce((sum, dayProgress) => {
        return sum + Number(dayProgress[zikrId] || 0);
      }, 0);
    }

    function getDayTotal(dateKey = getTodayKey()) {
      return getAllZikrs().reduce((sum, zikr) => sum + getCount(zikr.id, dateKey), 0);
    }

    function isDone(zikrId, dateKey = getTodayKey()) {
      const zikr = getZikrById(zikrId);
      if (!zikr) return false;
      return getCount(zikrId, dateKey) >= zikr.target;
    }

    function incrementZikr(zikrId) {
      const zikr = getZikrById(zikrId);
      if (!zikr) return;
      const nextCount = Math.min(zikr.target, getCount(zikrId) + 1);
      setCount(zikrId, nextCount);

      if (tg?.HapticFeedback) {
        tg.HapticFeedback.impactOccurred("light");
      }

      render();
    }

    function resetZikr(zikrId) {
      setCount(zikrId, 0);
      render();
    }

    function deleteCurrentZikr() {
      const confirmed = window.confirm("Удалить этот зикр?");
      if (!confirmed) return;

      const current = getZikrById(state.zikrId);

      state.data.customZikrs = state.data.customZikrs.filter((item) => item.id !== state.zikrId);
      Object.values(state.data.progressByDate).forEach((dayProgress) => {
        delete dayProgress[state.zikrId];
      });

      saveData();

      const remaining = getAllZikrs(current?.category || state.currentCategory);
      state.zikrId = null;
      state.screen = remaining.length ? "category" : "mine";
      render();
      afterRenderTop();
    }

    function openCreateDialog(category = "daily") {
      zikrFormEl.reset();
      dialogTitleEl.textContent = "Добавить зикр";
      submitDialogButtonEl.textContent = "Сохранить";
      zikrFormEl.elements.id.value = "";
      zikrFormEl.elements.category.value = category;
      zikrFormEl.elements.target.value = 100;
      dialogEl.showModal();
    }

    function openEditDialog(zikrId) {
      const zikr = getZikrById(zikrId);
      if (!zikr) return;

      dialogTitleEl.textContent = "Редактировать зикр";
      submitDialogButtonEl.textContent = "Сохранить изменения";
      zikrFormEl.elements.id.value = zikr.id;
      zikrFormEl.elements.category.value = zikr.category || "daily";
      zikrFormEl.elements.title.value = zikr.title || "";
      zikrFormEl.elements.arabic.value = zikr.arabic || "";
      zikrFormEl.elements.transliteration.value = zikr.transliteration || "";
      zikrFormEl.elements.translation.value = zikr.translation || "";
      zikrFormEl.elements.target.value = zikr.target || 100;
      dialogEl.showModal();
    }

    function openManageDialog() {
      const zikr = getZikrById(state.zikrId);
      if (!zikr) return;

      manageTitleEl.textContent = `Управление — ${getDisplayLabel(zikr.id)}`;
      manageTotalValueEl.textContent = getAllTimeCount(zikr.id);
      manageDialogEl.showModal();
    }

    function goToPrevZikr() {
      const items = getAllZikrs(state.currentCategory);
      if (!items.length || !state.zikrId) return;
      const currentIndex = items.findIndex((item) => item.id === state.zikrId);
      const prevIndex = currentIndex > 0 ? currentIndex - 1 : items.length - 1;
      state.zikrId = items[prevIndex].id;
      render();
      afterRenderTop();
    }

    function goToNextZikr() {
      const items = getAllZikrs(state.currentCategory);
      if (!items.length || !state.zikrId) return;
      const currentIndex = items.findIndex((item) => item.id === state.zikrId);
      const nextIndex = currentIndex >= 0 ? (currentIndex + 1) % items.length : 0;
      state.zikrId = items[nextIndex].id;
      render();
      afterRenderTop();
    }

    function getCategoryStats(category) {
      const items = getAllZikrs(category);
      const completed = items.filter((item) => isDone(item.id)).length;
      const totalToday = items.reduce((sum, item) => sum + getCount(item.id), 0);
      const allTimeTotal = items.reduce((sum, item) => sum + getAllTimeCount(item.id), 0);

      return {
        total: items.length,
        completed,
        totalToday,
        allTimeTotal,
        percent: items.length ? Math.round((completed / items.length) * 100) : 0,
        allDone: items.length > 0 && completed === items.length
      };
    }

    function getDayStats(dateKey) {
      const zikrs = getAllZikrs();
      const completed = zikrs.filter((item) => isDone(item.id, dateKey)).length;
      const totalRepeats = getDayTotal(dateKey);

      return {
        total: zikrs.length,
        completed,
        totalRepeats,
        active: totalRepeats > 0,
        allDone: zikrs.length > 0 && completed === zikrs.length
      };
    }

    function getActiveStreak() {
      let streak = 0;
      const date = new Date();

      while (true) {
        const dateKey = getDateKey(date);
        if (!getDayStats(dateKey).active) break;
        streak += 1;
        date.setDate(date.getDate() - 1);
      }

      return streak;
    }

    function getMonthModel(offset = 0) {
      const today = new Date();
      const monthDate = new Date(today.getFullYear(), today.getMonth() + offset, 1);
      const year = monthDate.getFullYear();
      const month = monthDate.getMonth();
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const daysInMonth = lastDay.getDate();
      const startOffset = (firstDay.getDay() + 6) % 7;
      const totalCells = Math.ceil((startOffset + daysInMonth) / 7) * 7;
      const cells = [];

      for (let i = 0; i < totalCells; i += 1) {
        if (i < startOffset || i >= startOffset + daysInMonth) {
          cells.push({ empty: true });
          continue;
        }

        const dayNumber = i - startOffset + 1;
        const date = new Date(year, month, dayNumber);
        const dateKey = getDateKey(date);
        const stats = getDayStats(dateKey);

        cells.push({
          empty: false,
          dateKey,
          dayNumber,
          isToday: dateKey === getTodayKey(),
          ...stats
        });
      }

      return {
        monthLabel: monthDate.toLocaleDateString("ru-RU", { month: "long", year: "numeric" }),
        cells
      };
    }

    function getMonthActivity(offset = 0) {
      const today = new Date();
      const date = new Date(today.getFullYear(), today.getMonth() + offset, 1);
      const year = date.getFullYear();
      const month = date.getMonth();
      let activeDays = 0;
      let doneDays = 0;

      Object.keys(state.data.progressByDate).forEach((dateKey) => {
        const [y, m] = dateKey.split("-").map(Number);
        if (y === year && m === month + 1) {
          const stats = getDayStats(dateKey);
          if (stats.active) activeDays += 1;
          if (stats.allDone) doneDays += 1;
        }
      });

      return { activeDays, doneDays };
    }

    function handleBack() {
      if (state.screen === "detail") {
        state.screen = "category";
        state.zikrId = null;
        render();
        afterRenderTop();
        return;
      }

      if (state.screen === "category") {
        state.screen = "mine";
        render();
        afterRenderTop();
        return;
      }

      if (state.screen === "habit") {
        state.screen = "stats";
        render();
        afterRenderTop();
      }
    }

    function syncNav() {
      const active = state.screen === "stats" || state.screen === "habit" ? "stats" : "mine";
      document.querySelectorAll(".nav-btn").forEach((button) => {
        button.classList.toggle("active", button.dataset.tab === active);
      });
    }

    function setHeader(title, showBack = false) {
      screenTitleEl.textContent = title;
      backButtonEl.classList.toggle("hidden", !showBack);
    }

    function render() {
      syncNav();

      const isDetail = state.screen === "detail";
      const isSubscreen = state.screen === "detail" || state.screen === "habit";

      appEl.classList.toggle("with-detail-dock", isDetail);
      detailDockEl.classList.toggle("active", isDetail);
      bottomNavEl.classList.toggle("hidden-in-subscreen", isSubscreen);

      if (state.screen === "detail") {
        setHeader(getDisplayLabel(state.zikrId), true);
        appEl.innerHTML = renderDetail(state.zikrId);
        detailDockEl.innerHTML = renderDetailDock(state.zikrId);
        bindDetailActions();
        return;
      }

      detailDockEl.innerHTML = "";

      if (state.screen === "category") {
        setHeader(CATEGORY_META[state.currentCategory].title, true);
        appEl.innerHTML = renderCategory(state.currentCategory);
        bindCategoryActions();
        return;
      }

      if (state.screen === "habit") {
        setHeader("Дневник привычек", true);
        appEl.innerHTML = renderHabitJournal();
        bindHabitActions();
        return;
      }

      if (state.screen === "stats") {
        setHeader("Статистика");
        appEl.innerHTML = renderStats();
        bindStatsActions();
        return;
      }

      setHeader("Мои зикры");
      appEl.innerHTML = renderMine();
      bindMineActions();
    }

    function renderMine() {
      return `
        <section class="screen mine-screen">
          <div class="hero-panel">
            <div class="hero-glow"></div>
            <div class="hero-arch"></div>
            <div class="hero-mosque">
              <div class="base"></div>
              <div class="dome"></div>
              <div class="minaret left"></div>
              <div class="minaret right"></div>
              <div class="crescent">☾</div>
            </div>
          </div>

          <div class="category-stack">
            ${renderCategoryCard("morning")}
            ${renderCategoryCard("evening")}
            ${renderCategoryCard("daily")}
          </div>
        </section>
      `;
    }

    function renderCategoryCard(category) {
      const meta = CATEGORY_META[category];
      const stats = getCategoryStats(category);

      const badge = stats.allDone
        ? '<span class="status-badge">✓</span>'
        : `<span class="category-badge">${stats.total}</span>`;

      return `
        <button class="category-card" data-category="${category}">
          <div class="category-card-main">
            <div class="category-card-title">${meta.title}</div>
            <div class="category-card-sub">Сегодня выполнено ${stats.completed}/${stats.total}</div>
            <div class="substat">Всего прочитано: ${stats.allTimeTotal}</div>
          </div>
          ${badge}
        </button>
      `;
    }

    function renderCategory(category) {
      const meta = CATEGORY_META[category];
      const items = getAllZikrs(category);
      const stats = getCategoryStats(category);

      if (!items.length) {
        return `
          <section class="screen">
            <div class="empty-state">
              <h3>В разделе пока нет зикров</h3>
              <p>Нажмите плюс сверху, чтобы добавить новый зикр в раздел «${meta.title}».</p>
            </div>
          </section>
        `;
      }

      return `
        <section class="screen">
          <div class="glass-card" style="padding:20px; border-radius:28px;">
            <div class="section-hero-title">${meta.title}</div>
            <div style="margin-top:10px; text-align:center; color:var(--gold); font-size:30px; font-weight:900;">
              ${stats.completed}/${stats.total}
            </div>
            <div style="margin-top:6px; text-align:center;" class="muted">
              Выполнено сегодня
            </div>
          </div>

          ${items.map((zikr) => renderZikrRow(zikr)).join("")}
        </section>
      `;
    }

    function renderZikrRow(zikr) {
      const todayCount = getCount(zikr.id);
      const allTimeCount = getAllTimeCount(zikr.id);

      return `
        <button class="list-row zikr-row" data-zikr-id="${zikr.id}">
          <div class="list-row-main">
            <div class="list-row-title">${getDisplayLabel(zikr.id)}</div>
            <div class="list-row-note">${zikr.title || ""}</div>
            <div class="muted">Сегодня ${todayCount} / ${zikr.target}</div>
            <div class="substat">Всего прочитано: ${allTimeCount}</div>
          </div>
          ${
            isDone(zikr.id)
              ? '<span class="status-badge">✓</span>'
              : `<span class="count-badge">${zikr.target}</span>`
          }
        </button>
      `;
    }

    function renderDetail(zikrId) {
      const zikr = getZikrById(zikrId);
      if (!zikr) {
        return `
          <section class="screen">
            <div class="empty-state">
              <h3>Зикр не найден</h3>
              <p>Вернитесь назад и попробуйте открыть заново.</p>
            </div>
          </section>
        `;
      }

      return `
        <section class="screen">
          <div class="reading-card">
            <div class="reading-topline">
              <span class="reading-chip">${CATEGORY_META[zikr.category || "daily"].title}</span>
              <span class="reading-chip">${getDisplayLabel(zikr.id)}</span>
            </div>

            <h3 class="reading-title">${zikr.title || getDisplayLabel(zikr.id)}</h3>

            ${zikr.arabic ? `<div class="arabic">${zikr.arabic}</div>` : ""}
            ${zikr.transliteration ? `<div class="transliteration">${zikr.transliteration}</div>` : ""}
            ${zikr.translation ? `<div class="translation">${zikr.translation}</div>` : ""}
          </div>
        </section>
      `;
    }

    function renderDetailDock(zikrId) {
      const zikr = getZikrById(zikrId);
      if (!zikr) return "";

      const count = getCount(zikr.id);
      const done = isDone(zikr.id);
      const progress = zikr.target ? Math.min(100, Math.round((count / zikr.target) * 100)) : 0;
      const hasMany = getAllZikrs(state.currentCategory).length > 1;

      return `
        <div class="detail-dock-card">
          <button class="tap-panel ${done ? "done-state" : ""}" id="incrementPanelBtn" aria-label="Добавить повтор">
            <div class="tap-progress">
              <div class="tap-progress-fill" style="width:${progress}%"></div>
            </div>

            ${
              done
                ? `
                  <div class="tap-complete-wrap">
                    <div class="tap-complete-icon">✓</div>
                    <div class="tap-complete-title">Выполнено сегодня</div>
                    <div class="tap-complete-sub">МашаАллах, цель закрыта</div>
                  </div>
                `
                : `
                  <div class="tap-count">${count}</div>
                  <div class="tap-progress-text">${count}/${zikr.target}</div>
                `
            }

            <div class="tap-hint">Нажмите на счетчик</div>
          </button>

          <div class="dock-footer">
            <button class="arrow-btn" id="prevZikrBtn" ${hasMany ? "" : "disabled"}>‹</button>
            <button class="dock-btn" id="manageBtn">Опции</button>
            <button class="arrow-btn" id="nextZikrBtn" ${hasMany ? "" : "disabled"}>›</button>
          </div>
        </div>
      `;
    }

    function renderStats() {
      const morningStats = getCategoryStats("morning");
      const eveningStats = getCategoryStats("evening");
      const dailyStats = getCategoryStats("daily");
      const streak = getActiveStreak();

      return `
        <section class="screen">
          <div class="stats-grid-categories">
            <div class="stat-box progress-stat">
              <strong>${morningStats.percent}%</strong>
              <span>Утренние зикры</span>
              <div class="progress-track">
                <div class="progress-fill-green" style="width:${morningStats.percent}%"></div>
              </div>
            </div>

            <div class="stat-box progress-stat">
              <strong>${eveningStats.percent}%</strong>
              <span>Вечерние зикры</span>
              <div class="progress-track">
                <div class="progress-fill-green" style="width:${eveningStats.percent}%"></div>
              </div>
            </div>

            <div class="stat-box progress-stat">
              <strong>${dailyStats.percent}%</strong>
              <span>Повседневные зикры</span>
              <div class="progress-track">
                <div class="progress-fill-green" style="width:${dailyStats.percent}%"></div>
              </div>
            </div>

            <div class="stat-box">
              <strong>${streak}</strong>
              <span>Дней подряд</span>
            </div>
          </div>

          <button class="diary-open-btn" id="openHabitJournalBtn">
            <div>
              <div class="diary-open-title">Дневник привычек</div>
              <div class="diary-open-subtitle">Открой календарь активности и посмотри, какие дни были выполнены.</div>
            </div>
            <div class="diary-open-icon">→</div>
          </button>
        </section>
      `;
    }

    function renderHabitJournal() {
      const month = getMonthModel(state.calendarOffset);
      const monthActivity = getMonthActivity(state.calendarOffset);
      const weekdays = ["Пн", "Вт", "Ср", "Чт", "Пт", "Сб", "Вс"];

      return `
        <section class="screen">
          <div class="calendar-card">
            <div class="calendar-head">
              <div>
                <h3 class="calendar-title">Дневник привычек</h3>
                <div class="muted">День закрывается, когда выполнены все добавленные ежедневные зикры.</div>
              </div>

              <div class="calendar-nav">
                <button class="month-switch" id="prevMonthBtn">←</button>
                <button class="month-switch" id="nextMonthBtn">→</button>
              </div>
            </div>

            <div class="mini-stats-row">
              <span class="mini-stat">${month.monthLabel}</span>
              <span class="mini-stat">Активных дней: <strong>${monthActivity.activeDays}</strong></span>
              <span class="mini-stat">Закрытых дней: <strong>${monthActivity.doneDays}</strong></span>
            </div>

            <div class="calendar-weekdays">
              ${weekdays.map((day) => `<div class="weekday-cell">${day}</div>`).join("")}
            </div>

            <div class="calendar-grid">
              ${month.cells.map((item) => {
                if (item.empty) return '<div class="calendar-cell empty"></div>';

                return `
                  <div class="calendar-cell ${item.isToday ? "today" : ""} ${item.allDone ? "done" : ""} ${item.active && !item.allDone ? "active" : ""}">
                    <div class="calendar-day">${item.dayNumber}</div>
                    <div class="calendar-mark">${item.allDone ? "✅" : item.active ? `${item.totalRepeats}` : "—"}</div>
                  </div>
                `;
              }).join("")}
            </div>
          </div>
        </section>
      `;
    }

    function bindMineActions() {
      appEl.querySelectorAll(".category-card").forEach((button) => {
        button.addEventListener("click", () => {
          state.currentCategory = button.dataset.category;
          state.screen = "category";
          render();
          afterRenderTop();
        });
      });
    }

    function bindCategoryActions() {
      appEl.querySelectorAll(".zikr-row").forEach((button) => {
        button.addEventListener("click", () => {
          const zikr = getZikrById(button.dataset.zikrId);
          state.zikrId = zikr.id;
          state.currentCategory = zikr.category || "daily";
          state.screen = "detail";
          render();
          afterRenderTop();
        });
      });
    }

    function bindDetailActions() {
      const incrementPanelBtn = document.getElementById("incrementPanelBtn");
      const manageBtn = document.getElementById("manageBtn");
      const prevZikrBtn = document.getElementById("prevZikrBtn");
      const nextZikrBtn = document.getElementById("nextZikrBtn");

      incrementPanelBtn?.addEventListener("click", () => {
        incrementZikr(state.zikrId);
      });

      manageBtn?.addEventListener("click", () => {
        openManageDialog();
      });

      prevZikrBtn?.addEventListener("click", () => {
        goToPrevZikr();
      });

      nextZikrBtn?.addEventListener("click", () => {
        goToNextZikr();
      });
    }

    function bindStatsActions() {
      const openHabitJournalBtn = document.getElementById("openHabitJournalBtn");
      openHabitJournalBtn?.addEventListener("click", () => {
        state.screen = "habit";
        render();
        afterRenderTop();
      });
    }

    function bindHabitActions() {
      const prevMonthBtn = document.getElementById("prevMonthBtn");
      const nextMonthBtn = document.getElementById("nextMonthBtn");

      prevMonthBtn?.addEventListener("click", () => {
        state.calendarOffset -= 1;
        render();
        afterRenderTop();
      });

      nextMonthBtn?.addEventListener("click", () => {
        state.calendarOffset += 1;
        render();
        afterRenderTop();
      });
    }
  </script>
</body>
</html>
